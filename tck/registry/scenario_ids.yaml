# neo4j-agent-memory TCK Scenario ID Registry
# Version: 0.1.0
#
# Each scenario has a stable ID that is never reassigned.
# Format: SCN-{TIER}-{NUMBER}
#   TIER: B (Bronze), S (Silver), G (Gold)
#   NUMBER: Three-digit sequential number
#
# Once published in a released version, a scenario ID is permanent.

