# Multi-agent memory demo — local development
#
# Usage:
#   docker compose up
#   # Dashboard: http://localhost:3000
#   # Lenny:     http://localhost:8001
#   # Scout:     http://localhost:8002
#   # Forge:     http://localhost:8003
#   # Atlas:     http://localhost:8004

services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  lenny:
    build:
      context: ../agents/lenny
    ports:
      - "8001:8001"
    environment:
      MEMORY_ENDPOINT: http://neo4j:7474  # Would be Cypherlite Cloud in production
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: "8001"
    depends_on:
      neo4j:
        condition: service_healthy

  scout:
    build:
      context: ../agents/scout
    ports:
      - "8002:8002"
    environment:
      MEMORY_ENDPOINT: http://neo4j:7474
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: "8002"
    depends_on:
      neo4j:
        condition: service_healthy

  forge:
    build:
      context: ../agents/forge
    ports:
      - "8003:8003"
    environment:
      MEMORY_ENDPOINT: http://neo4j:7474
      PORT: "8003"
    depends_on:
      neo4j:
        condition: service_healthy

  atlas:
    build:
      context: ../agents/atlas
    ports:
      - "8004:8004"
    environment:
      MEMORY_ENDPOINT: http://neo4j:7474
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: "8004"
    depends_on:
      neo4j:
        condition: service_healthy

  dashboard:
    build:
      context: ../dashboard
    ports:
      - "3000:3000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
      LENNY_URL: http://lenny:8001
      SCOUT_URL: http://scout:8002
      FORGE_URL: http://forge:8003
      ATLAS_URL: http://atlas:8004
    depends_on:
      - lenny
      - scout
      - forge
      - atlas

volumes:
  neo4j_data:
