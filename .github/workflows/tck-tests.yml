name: TCK Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: testpassword

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra reference --extra dev

      - name: Run Bronze tier tests
        run: |
          uv run pytest -m bronze \
            --json-report --json-report-file=bronze-results.json \
            -v

      - name: Run Silver tier tests
        run: |
          uv run pytest -m silver \
            --json-report --json-report-file=silver-results.json \
            -v
        continue-on-error: true

      - name: Run Gold tier tests
        run: |
          uv run pytest -m gold \
            --json-report --json-report-file=gold-results.json \
            -v
        continue-on-error: true

      - name: Run full test suite
        run: |
          uv run pytest \
            --json-report --json-report-file=full-results.json \
            -v

      - name: Generate compliance report
        if: always()
        run: |
          uv run tck full-results.json \
            --name "neo4j-agent-memory (reference)" \
            --version "0.0.5" \
            --output compliance-report.json \
            --html compliance-report.html
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tck-results-py${{ matrix.python-version }}
          path: |
            *-results.json
            compliance-report.*

  validate-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Validate scenario registry
        run: uv run python -m tck.registry.validator

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

      - name: Run mypy
        run: uv run mypy tck/
        continue-on-error: true

  csharp-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Build C# client
        run: dotnet build clients/csharp/Neo4j.AgentMemory.sln

      - name: Run C# unit tests
        run: dotnet test clients/csharp/tests/Neo4j.AgentMemory.Tests/

  rlang-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev

      - name: Install R packages
        run: |
          Rscript -e "
            lib <- Sys.getenv('R_LIBS_USER', '/usr/local/lib/R/site-library')
            dir.create(lib, recursive = TRUE, showWarnings = FALSE)
            .libPaths(c(lib, .libPaths()))
            install.packages(c('testthat', 'httr2', 'R6', 'jsonlite'), lib = lib, repos = 'https://cloud.r-project.org/')
          "

      - name: Run R unit tests
        run: |
          cd clients/rlang/neo4j.memory
          Rscript -e "
            .libPaths(c(Sys.getenv('R_LIBS_USER'), .libPaths()))
            library(R6); library(httr2); library(jsonlite)
            for (f in list.files('R', full.names = TRUE)) source(f)
            testthat::test_dir('tests/testthat', reporter = 'summary', stop_on_failure = TRUE)
          "

  rlang-conformance:
    runs-on: ubuntu-latest
    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: testpassword

    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libsodium-dev

      - name: Install R packages
        run: |
          Rscript -e "
            lib <- Sys.getenv('R_LIBS_USER', '/usr/local/lib/R/site-library')
            dir.create(lib, recursive = TRUE, showWarnings = FALSE)
            .libPaths(c(lib, .libPaths()))
            pkgs <- c('plumber', 'httr2', 'R6', 'jsonlite', 'testthat')
            install.packages(pkgs, lib = lib, repos = 'https://cloud.r-project.org/')
            for (p in pkgs) {
              if (!requireNamespace(p, quietly = TRUE)) stop(paste('Failed to install:', p))
            }
            cat('All packages installed successfully\n')
          "

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install TCK dependencies
        run: uv sync --extra reference --extra bridge

      - name: Start reference bridge server
        run: |
          uv run python -m tck.bridge.reference_server &
          sleep 5

      - name: Start R conformance server
        run: |
          cd clients/rlang/conformance
          MEMORY_ENDPOINT=http://localhost:3001 TCK_BRIDGE_PORT=3002 Rscript server.R > /tmp/r-conformance.log 2>&1 &
          R_PID=$!
          echo "R conformance server PID: $R_PID"
          READY=false
          for i in $(seq 1 60); do
            if ! kill -0 $R_PID 2>/dev/null; then
              echo "R conformance server crashed! Logs:"
              cat /tmp/r-conformance.log
              exit 1
            fi
            if curl -s -X POST http://localhost:3002/setup > /dev/null 2>&1; then
              echo "R conformance server ready on port 3002"
              READY=true
              break
            fi
            sleep 1
          done
          if [ "$READY" != "true" ]; then
            echo "R conformance server failed to start within 60s. Logs:"
            cat /tmp/r-conformance.log
            exit 1
          fi

      - name: Run R integration tests
        run: |
          cd clients/rlang/neo4j.memory
          MEMORY_ENDPOINT=http://localhost:3001 Rscript -e "
            .libPaths(c(Sys.getenv('R_LIBS_USER'), .libPaths()))
            library(R6); library(httr2); library(jsonlite)
            for (f in list.files('R', full.names = TRUE)) source(f)
            testthat::test_dir('tests/testthat', reporter = 'summary', stop_on_failure = TRUE, filter = 'integration')
          "

      - name: Run TCK Bronze via R bridge
        run: |
          uv run pytest -m bronze --bridge-url http://localhost:3002 -v

  csharp-conformance:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: testpassword

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install TCK dependencies
        run: uv sync --extra reference --extra bridge

      - name: Build C# conformance server
        run: dotnet build clients/csharp/Neo4j.AgentMemory.sln

      - name: Start reference bridge server
        run: |
          uv run python -m tck.bridge.reference_server &
          sleep 5

      - name: Start C# conformance server
        run: |
          cd clients/csharp/conformance/Neo4j.AgentMemory.Conformance
          MEMORY_ENDPOINT=http://localhost:3001 TCK_BRIDGE_PORT=3002 dotnet run --no-build &
          for i in $(seq 1 30); do curl -s http://localhost:3002/setup > /dev/null 2>&1 && break || sleep 1; done

      - name: Run TCK Bronze via C# bridge
        run: |
          uv run pytest -m bronze --bridge-url http://localhost:3002 -v
