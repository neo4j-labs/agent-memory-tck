name: Client Tests

# Per-client unit + integration tests (always run) and e2e tests (gated on
# the MEMORY_API_KEY repo secret) for the five language SDKs.
#
# Forks and PRs without secret access still pass: every e2e test skips
# gracefully when MEMORY_API_KEY is empty.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------- Python ----------------
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Install Python client + dev deps
        # uv sync creates a managed .venv at clients/python/.venv. We avoid
        # `--system` because Ubuntu 24's Python 3.12 is marked PEP-668
        # externally-managed.
        run: |
          cd clients/python
          uv sync --extra dev
      - name: Unit tests
        run: |
          cd clients/python
          uv run pytest -m unit -v
      - name: Integration tests
        run: |
          cd clients/python
          uv run pytest -m integration -v
      - name: E2E tests (skipped if MEMORY_API_KEY unset)
        env:
          MEMORY_ENDPOINT: ${{ vars.MEMORY_ENDPOINT || 'https://memory.neo4jlabs.com/v1' }}
          MEMORY_API_KEY: ${{ secrets.MEMORY_API_KEY }}
        run: |
          cd clients/python
          uv run pytest -m e2e -v

  # ---------------- TypeScript ----------------
  typescript-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: |
          cd clients/typescript
          npm install
      - name: Type check
        run: |
          cd clients/typescript
          npx tsc --noEmit
      - name: Unit tests
        run: |
          cd clients/typescript
          npm run test:unit
      - name: Integration tests
        run: |
          cd clients/typescript
          npm run test:integration
      - name: E2E tests (skipped if MEMORY_API_KEY unset)
        env:
          MEMORY_ENDPOINT: ${{ vars.MEMORY_ENDPOINT || 'https://memory.neo4jlabs.com/v1' }}
          MEMORY_API_KEY: ${{ secrets.MEMORY_API_KEY }}
        run: |
          cd clients/typescript
          npm run test:e2e

  # ---------------- Go ----------------
  go-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Vet
        run: |
          cd clients/go
          go vet ./memory/
      - name: Unit + integration tests (default tags)
        run: |
          cd clients/go
          go test -count=1 -v ./memory/
      - name: E2E tests (skipped if MEMORY_API_KEY unset)
        env:
          MEMORY_ENDPOINT: ${{ vars.MEMORY_ENDPOINT || 'https://memory.neo4jlabs.com/v1' }}
          MEMORY_API_KEY: ${{ secrets.MEMORY_API_KEY }}
        run: |
          cd clients/go
          # `-tags=e2e` enables the e2e_hosted_test.go file. Tests inside
          # call t.Skip() when MEMORY_API_KEY is empty.
          go test -count=1 -tags=e2e -v -run TestE2E ./memory/

  # ---------------- C# ----------------
  csharp-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      - name: Restore
        run: dotnet restore clients/csharp/Neo4j.AgentMemory.sln
      - name: Build
        run: dotnet build clients/csharp/Neo4j.AgentMemory.sln --no-restore
      - name: Unit + integration tests
        run: |
          dotnet test clients/csharp/tests/Neo4j.AgentMemory.Tests/ \
            --no-build --filter "Category!=E2E"
      - name: E2E tests (skipped if MEMORY_API_KEY unset)
        env:
          MEMORY_ENDPOINT: ${{ vars.MEMORY_ENDPOINT || 'https://memory.neo4jlabs.com/v1' }}
          MEMORY_API_KEY: ${{ secrets.MEMORY_API_KEY }}
        run: |
          dotnet test clients/csharp/tests/Neo4j.AgentMemory.Tests/ \
            --no-build --filter "Category=E2E"

  # ---------------- R ----------------
  rlang-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'
          # Use vanilla CRAN, not RSPM — RSPM defaults set by setup-r have
          # caused install.packages to silently produce empty libraries on
          # Ubuntu Noble in this repo.
          use-public-rspm: false
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libsodium-dev
      - name: Install R dependencies
        # setup-r-dependencies handles caching and reads Imports/Suggests
        # from DESCRIPTION. We add testthat explicitly because it lives in
        # Suggests but is required by the test runner.
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: clients/rlang/neo4j.memory
          extra-packages: |
            any::testthat
            any::httr2
            any::R6
            any::jsonlite
      - name: Verify packages installed
        run: |
          Rscript -e "
            for (p in c('testthat', 'httr2', 'R6', 'jsonlite')) {
              if (!requireNamespace(p, quietly = TRUE)) stop(paste('missing:', p))
            }
            cat('all R packages installed\n')
          "
      - name: Unit tests (skip e2e + bridge integration when no servers)
        run: |
          cd clients/rlang/neo4j.memory
          Rscript -e "
            library(R6); library(httr2); library(jsonlite); library(testthat)
            for (f in list.files('R', full.names = TRUE)) source(f)
            # Skip integration + e2e here — they need a live endpoint.
            testthat::test_dir('tests/testthat', reporter = 'summary',
              stop_on_failure = TRUE,
              filter = '^(casing|transport-selection|mcp-tools|short-term|long-term|reasoning|models|memory-client|transport)$')
          "
      - name: E2E tests (skipped if MEMORY_API_KEY unset)
        env:
          MEMORY_ENDPOINT: ${{ vars.MEMORY_ENDPOINT || 'https://memory.neo4jlabs.com/v1' }}
          MEMORY_API_KEY: ${{ secrets.MEMORY_API_KEY }}
        run: |
          cd clients/rlang/neo4j.memory
          Rscript -e "
            library(R6); library(httr2); library(jsonlite); library(testthat)
            for (f in list.files('R', full.names = TRUE)) source(f)
            testthat::test_dir('tests/testthat', reporter = 'summary',
              stop_on_failure = TRUE, filter = 'e2e-hosted')
          "
